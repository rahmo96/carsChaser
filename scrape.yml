name: Scrape Cars and Update Site

# מתי הקוד ירוץ?
on:
  schedule:
    - cron: '0 */6 * * *' # הפעלה אוטומטית כל 6 שעות
  workflow_dispatch: # כפתור שיאפשר לך להפעיל את הסריקה ידנית מתי שתרצה

# What permissions the workflow needs to run
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the latest code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraping code
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Updated cars list" || echo "No changes to commit"
          git push