name: Scrape Cars and Update Site

# מתי הקוד ירוץ?
on:
  schedule:
    - cron: '0 */6 * * *' # הפעלה אוטומטית כל 6 שעות
  workflow_dispatch: # כפתור שיאפשר לך להפעיל את הסריקה ידנית מתי שתרצה

# הרשאות כדי שהשרת יוכל לשמור את הקובץ החדש באתר
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: הבאת הקוד מהמאגר שלך
        uses: actions/checkout@v3

      - name: התקנת פייתון
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: התקנת הספריות הדרושות (כולל הדפדפן הווירטואלי)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: הרצת קוד הסריקה
        run: python scraper.py

      - name: שמירת האתר המעודכן בחזרה לענן
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Updated cars list" || echo "No changes to commit"
          git push